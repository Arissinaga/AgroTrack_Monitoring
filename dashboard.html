<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Produksi</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#f1f5f9;}
.container{display:grid;grid-template-columns:250px 1fr;height:100vh;}
.sidebar{background:#2563eb;color:white;padding:20px;}
.sidebar a{display:block;padding:10px;margin:10px 0;cursor:pointer;}
.content{padding:20px;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:15px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
button{padding:8px;background:red;color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>AgroTrack</h2>
  <a onclick="show('dashboard')">Dashboard</a>
  <a onclick="show('input')">Input</a>
  <a onclick="show('monitoring')">Monitoring</a>
  <a onclick="logout()">Logout</a>
</div>

<div class="content">

<div id="dashboard">
  <div class="grid">
    <div class="card">Target: 1000</div>
    <div class="card">Realisasi: <span id="real">0</span></div>
    <div class="card">Efisiensi: <span id="ef">0%</span></div>
    <div class="card">Status: <span id="status">Idle</span></div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>
</div>

<div id="input" style="display:none">
  <div class="card">
    <input id="kebun" placeholder="Kebun"><br><br>
    <input id="jumlah" type="number" placeholder="Jumlah"><br><br>

    <select id="shift">
      <option value="pagi">pagi</option>
      <option value="siang">siang</option>
      <option value="malam">malam</option>
    </select><br><br>

    <input type="date" id="tanggal"><br><br>

    <button onclick="simpan()">Simpan</button>
  </div>
</div>

<div id="monitoring" style="display:none">
  <div class="card">
    <table width="100%">
      <thead>
        <tr>
          <th>Kebun</th>
          <th>Jumlah</th>
          <th>Shift</th>
          <th>Tanggal</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabel"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>

// 🔐 LOGIN CHECK
if(!localStorage.getItem("user")){
  window.location.href = "index.html";
}

// 🔗 API
const API = "https://sheetdb.io/api/v1/339u8mqen9gpi";

let data = [];
let chart;

// 🔁 NAVIGASI
function show(id){
  ['dashboard','input','monitoring'].forEach(x=>{
    document.getElementById(x).style.display='none';
  });
  document.getElementById(id).style.display='block';
}

// 🔓 LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

// 📥 LOAD DATA
async function loadData(){
  try{
    const res = await fetch(API);
    const result = await res.json();

    console.log("DATA API:", result);

    data = result.map(d => ({
      id: d.id,
      kebun: d.kebun || '-',
      jumlah: parseInt(d.jumlah) || 0,
      shift: d.shift || '-',
      tanggal: d.tanggal || ''
    }));

    render();

  } catch(err){
    console.error("ERROR LOAD DATA:", err);
  }
}

// 💾 SIMPAN
async function simpan(){

  const payload = {
    kebun: document.getElementById('kebun').value,
    jumlah: document.getElementById('jumlah').value,
    shift: document.getElementById('shift').value,
    tanggal: document.getElementById('tanggal').value
  };

  console.log("MODE:", editId ? "UPDATE" : "INSERT");

  if(editId){

    // ✅ UPDATE
    await fetch(`${API}/id/${editId}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        data: payload
      })
    });

    alert("Data berhasil diupdate");

    editId = null;

  } else {

    // ✅ INSERT
    await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        data:[{
          id: Date.now(),
          ...payload
        }]
      })
    });

    alert("Data berhasil ditambahkan");
  }

  // reset form
  document.getElementById('kebun').value = '';
  document.getElementById('jumlah').value = '';
  document.getElementById('tanggal').value = '';

  loadData();
  alert("Data berhasil disimpan");
}

// ❌ HAPUS
async function hapus(id){

  if(!confirm("Yakin ingin menghapus data?")) return;

  await fetch(`${API}/id/${id}`,{
    method:'DELETE'
  });

  loadData();
}

// 🎨 RENDER
function render(){

  console.log("DATA RENDER:", data);

  let total = data.reduce((a,b)=>a+b.jumlah,0);
  let target = 1000;

  document.getElementById('real').innerText = total;

  let ef = target > 0 ? ((total/target)*100).toFixed(1) : 0;
  document.getElementById('ef').innerText = ef + '%';

  document.getElementById('status').innerText =
    total > 0 ? 'Running' : 'Idle';

  //Function Edit (Isi form Otomatis)
  function editData(id){

  console.log("EDIT ID:", id);

  const d = data.find(x => String(x.id) === String(id));

  if(!d){
    alert("Data tidak ditemukan!");
    return;
  }

  document.getElementById('kebun').value = d.kebun;
  document.getElementById('jumlah').value = d.jumlah;
  document.getElementById('shift').value = d.shift;
  document.getElementById('tanggal').value = d.tanggal;

  editId = d.id;

  console.log("SET editId:", editId);

  show('input');
}
    // ✅ TABEL
  let html='';
  let editid = null;

  if(data.length === 0){
    html = "<tr><td colspan='5'>Data kosong</td></tr>";
  } else {
    data.forEach(d=>{
      html+=`
<tr>
  <td>${d.kebun}</td>
  <td>${d.jumlah}</td>
  <td>${d.shift}</td>
  <td>${d.tanggal}</td>
  <td>
    <button onclick="editData('${d.id}')">Edit</button>
    <button onclick="hapus(${d.id})">Hapus</button>
  </td>
</tr>`;
    });
  }

  document.getElementById('tabel').innerHTML = html;

  // ✅ GRAFIK
  let group = {};

  data.forEach(d=>{
    if(d.tanggal){
      if(!group[d.tanggal]) group[d.tanggal]=0;
      group[d.tanggal]+=d.jumlah;
    }
  });

  let labels = Object.keys(group);
  let values = Object.values(group);

  if(chart) chart.destroy();

  if(labels.length > 0){
    chart = new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels:labels,
        datasets:[{
          label:'Produksi',
          data:values,
          borderWidth:2
        }]
      }
    });
  }
}

// 🚀 START
loadData();

</script>

</body>
</html>
